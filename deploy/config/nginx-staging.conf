# ── OpenScience Nginx config for STAGING Docker Compose ──────────────────
#
# Mirrors nginx-host.conf but with staging ports:
#   Backend on localhost:17000, Grafana on localhost:2300.
#   Nginx binds the external staging port (7192).
# ────────────────────────────────────────────────────────────────

server {
    listen 7192;
    server_name _;

    add_header X-Frame-Options       DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection      "1; mode=block" always;
    add_header Referrer-Policy        strict-origin-when-cross-origin always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob:; connect-src 'self' ws: wss:; font-src 'self' https://fonts.gstatic.com; frame-src 'self' blob:" always;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Block documentation endpoints at proxy level (defense in depth)
    location ~ ^/(docs|redoc|openapi.json) {
        return 404;
    }

    # Prometheus metrics endpoint (no auth — machine-to-machine)
    location = /metrics {
        proxy_pass http://127.0.0.1:17000/metrics;
        proxy_set_header Host $http_host;
    }

    # Proxy /api/ routes to backend
    location /api/ {
        proxy_pass http://127.0.0.1:17000/api/;
        proxy_set_header Host              $http_host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # File stream endpoint must be embeddable in the workspace-browser iframe.
    location /api/files/stream {
        proxy_pass http://127.0.0.1:17000/api/files/stream;
        proxy_set_header Host              $http_host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header X-Frame-Options SAMEORIGIN always;
    }

    location /files/stream {
        proxy_pass http://127.0.0.1:17000/files/stream;
        proxy_set_header Host              $http_host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header X-Frame-Options SAMEORIGIN always;
    }

    # Catch-all API routes that don't start with /api/
    location ~ ^/(auth|tasks|terminal|files|projects|workspaces|environments|sessions|literature|resources|settings|skills|health|admin|metrics|v1)/ {
        proxy_pass http://127.0.0.1:17000;
        proxy_set_header Host              $http_host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (terminal PTY, task SSE)
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # Internal auth-check endpoint for nginx auth_request
    location = /auth/check {
        proxy_pass http://127.0.0.1:17000/auth/check;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header X-Original-URI $request_uri;
    }

    # Auth-gated Grafana dashboard
    location /grafana {
        auth_request /auth/check;
        auth_request_set $ainrf_user $upstream_http_x_remote_user;
        auth_request_set $ainrf_user_role $upstream_http_x_remote_user_role;

        proxy_pass http://127.0.0.1:2300;
        proxy_set_header Host              $http_host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-WEBAUTH-USER    $ainrf_user;

        # WebSocket for Grafana live
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Auth-gated Prometheus web UI (host network: Prometheus listens on 127.0.0.1:9092)
    location /prometheus {
        auth_request /auth/check;
        auth_request_set $ainrf_user $upstream_http_x_remote_user;

        proxy_pass http://127.0.0.1:9092;
        proxy_set_header Host              $http_host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Auth-gated Litefuse LLM observability dashboard
    location = /litefuse {
        return 301 /litefuse/;
    }
    location /litefuse/ {
        auth_request /auth/check;
        auth_request_set $ainrf_user $upstream_http_x_remote_user;

        rewrite ^/litefuse/?(.*)$ /$1 break;
        proxy_pass http://127.0.0.1:13001;
        proxy_set_header Host              $http_host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    client_max_body_size 100m;
}
