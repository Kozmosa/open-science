# AINRF Prometheus Scrape Configuration — Host Network
# ────────────────────────────────────────────────────
# For docker-compose.cpu.yml where network_mode: host is used.
# Both Prometheus and AINRF share the host network namespace.

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: "ainrf"

rule_files:
  - "/etc/prometheus/rules/*.yml"

scrape_configs:
  - job_name: "ainrf"
    metrics_path: /metrics
    static_configs:
      - targets: ["localhost:8192"]
        labels:
          env: "production"
