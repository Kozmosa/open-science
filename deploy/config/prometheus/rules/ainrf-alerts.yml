# OpenScience Alerting Rules
# ────────────────────
# Loaded by Prometheus via rule_files in prometheus.yml.
# These rules assume the OpenScience metrics endpoint is being scraped at /metrics.

groups:
  - name: ainrf.http
    rules:
      - alert: AINRFHighErrorRate
        expr: |
          (
            sum(rate(ainrf_http_requests_total{status=~"5.."}[5m]))
            / sum(rate(ainrf_http_requests_total[5m]))
          ) > 0.05
        for: 5m
        labels:
          severity: critical
          component: api
        annotations:
          summary: "OpenScience 5xx error rate exceeds 5%"
          description: >
            The OpenScience backend is returning 5xx errors for more than 5% of
            requests over the last 5 minutes. Current rate:
            {{ $value | printf "%.2f" }}.

      - alert: AINRFHighLatency
        expr: |
          histogram_quantile(0.95,
            sum(rate(ainrf_http_request_duration_seconds_bucket[5m])) by (le)
          ) > 5
        for: 10m
        labels:
          severity: warning
          component: api
        annotations:
          summary: "OpenScience P95 latency exceeds 5 seconds"
          description: >
            The 95th percentile HTTP request latency has been above 5 seconds
            for 10 minutes. Current P95: {{ $value | printf "%.1f" }}s.

  - name: ainrf.tasks
    rules:
      - alert: AINRFTaskFailureSpike
        expr: |
          increase(ainrf_task_failed_total[10m]) > 5
        for: 5m
        labels:
          severity: warning
          component: agentic_researcher
        annotations:
          summary: "OpenScience task failure spike detected"
          description: >
            {{ $value }} tasks have failed in the last 10 minutes.
            This may indicate a systemic issue with the task execution pipeline
            or the underlying AI harness engines.

  - name: ainrf.ssh
    rules:
      - alert: AINRFSSHConnectionErrors
        expr: |
          rate(ainrf_ssh_connection_error_total[5m]) > 0.05
        for: 5m
        labels:
          severity: warning
          component: execution
        annotations:
          summary: "OpenScience SSH connection errors detected"
          description: >
            SSH connection errors are occurring at {{ $value | printf "%.2f" }}
            per second on host {{ $labels.host }}.  Check container health and
            network connectivity.

  - name: ainrf.db
    rules:
      - alert: AINRFSlowQuerySpike
        expr: |
          increase(ainrf_db_slow_query_total[10m]) > 10
        for: 5m
        labels:
          severity: warning
          component: database
        annotations:
          summary: "OpenScience database slow query spike"
          description: >
            {{ $value }} slow queries (>1s) were recorded in the last 10
            minutes on database {{ $labels.db }}.  Consider adding indexes or
            optimizing the queries.

  - name: ainrf.domain-control-plane
    rules:
      - alert: AINRFLegacyDomainWriteAttempt
        # This is a durable cumulative violation counter.  A no-port worker
        # can create its first API-visible sample at a non-zero value, so a
        # short `increase()` window would miss the event forever.
        expr: sum(ainrf_domain_legacy_write_attempts_total) > 0
        labels:
          severity: critical
          component: domain
        annotations:
          summary: "A sealed legacy domain source was targeted for write"
          description: >
            A legacy Project, Workspace, Environment, Task, or Session source
            write was blocked after domain cutover. This is a cutover-safety
            violation and must be investigated before any release action.

      - alert: AINRFDomainOutboxAgeWarning
        expr: ainrf_domain_dispatch_outbox_oldest_age_seconds > 300
        for: 5m
        labels:
          severity: warning
          component: domain-dispatch
        annotations:
          summary: "Domain dispatch outbox is older than five minutes"
          description: >
            The oldest recoverable pending/expired-lease dispatch or
            launch-unknown domain dispatch has exceeded five minutes. Normal
            running dispatched runtimes are excluded. Check dispatcher
            readiness and recovery state before retrying work.

      - alert: AINRFDomainOutboxAgeCritical
        expr: ainrf_domain_dispatch_outbox_oldest_age_seconds > 900
        for: 5m
        labels:
          severity: critical
          component: domain-dispatch
        annotations:
          summary: "Domain dispatch outbox is older than fifteen minutes"
          description: >
            A recoverable or launch-unknown domain dispatch has exceeded the
            fifteen-minute recovery bound. New release or cutover actions must
            stop until the backlog is reconciled.

      - alert: AINRFDomainMetricScrapeFailed
        expr: ainrf_domain_metrics_scrape_success == 0
        for: 5m
        labels:
          severity: critical
          component: domain-observability
        annotations:
          summary: "Durable domain metric scrape is failing"
          description: >
            Domain control-plane gauges retain their last known good values,
            but the current SQLite scrape is unavailable. Investigate the
            bounded SQLite error telemetry before any release or cutover gate
            is treated as healthy.

      - alert: AINRFDomainMetricRiskStateUnknown
        expr: ainrf_domain_metrics_risk_state_known != 1
        for: 1m
        labels:
          severity: critical
          component: domain-observability
        annotations:
          summary: "Domain risk gauges are unavailable rather than healthy"
          description: >
            Neither a current durable scrape nor a persisted last-known-good
            snapshot could be read. Domain risk gauges are exported as NaN,
            never zero. Block release, cutover, and cleanup decisions until
            the shared telemetry store and control-plane reads recover.

      - alert: AINRFDomainTelemetryReleaseGateBlocked
        expr: |
          absent(ainrf_domain_metrics_scrape_success)
          or up{job=~"ainrf(-staging)?"} != 1
          or ainrf_domain_metrics_scrape_success != 1
          or ainrf_domain_metrics_risk_state_known != 1
          or ainrf_domain_telemetry_delivery_failure_latched != 0
        for: 1m
        labels:
          severity: critical
          component: domain-observability
          release_gate: "B,E"
        annotations:
          summary: "Domain telemetry cannot satisfy a release gate"
          description: >
            Release B cutover and Release E compatibility cleanup require a
            current successful durable scrape and a known risk state. A
            cached snapshot remains observable during a transient source
            failure, but it is not release evidence.

      - alert: AINRFDomainTelemetryEventDeliveryFailure
        expr: ainrf_domain_telemetry_delivery_failure_latched != 0
        for: 1m
        labels:
          severity: critical
          component: domain-observability
          release_gate: "B,E"
        annotations:
          summary: "A durable domain telemetry event could not be recorded"
          description: >
            An immutable delivery-failure latch was written outside the
            telemetry sidecar. Do not clear it automatically: investigate and
            establish new release observation evidence before any cutover or
            compatibility cleanup decision.

      - alert: AINRFLiteratureResearchTaskPending
        expr: ainrf_domain_literature_saga_oldest_pending_age_seconds > 900
        for: 5m
        labels:
          severity: warning
          component: literature-saga
        annotations:
          summary: "Literature research Task saga has been pending for fifteen minutes"
          description: >
            A durable Literature-to-Task intent remains non-terminal for more
            than fifteen minutes. Inspect the saga work item and Task
            idempotency recovery evidence.

      - alert: AINRFOverviewSnapshotStale
        expr: ainrf_domain_overview_snapshot_oldest_age_seconds > 108000
        for: 30m
        labels:
          severity: warning
          component: overview
        annotations:
          summary: "Today overview snapshot is older than thirty hours"
          description: >
            At least one active user's latest durable Today overview snapshot
            is older than thirty hours. Check the Overview planner and its
            local source snapshots; it must not trigger external collection.

      - alert: AINRFOverviewMissingActiveUser
        expr: ainrf_domain_overview_missing_active_users > 0
        for: 30m
        labels:
          severity: warning
          component: overview
        annotations:
          summary: "An active user has no durable Today overview snapshot"
          description: >
            One or more active users lack a persisted Overview snapshot after
            the planner's expected catch-up window.

      - alert: AINRFDomainMigrationBlockingIssue
        expr: ainrf_domain_migration_issues{severity="blocking",resolution_status="open"} > 0
        for: 5m
        labels:
          severity: critical
          component: domain-migration
        annotations:
          summary: "Open blocking domain migration issue"
          description: >
            A cutover-blocking migration issue remains unresolved. Prepare and
            commit must remain unavailable until explicit remediation is
            recorded.

      - alert: AINRFDomainOrphanAttempt
        expr: sum(ainrf_domain_orphan_attempts) > 0
        for: 5m
        labels:
          severity: critical
          component: domain-attempt
        annotations:
          summary: "Domain Attempt has a missing durable reference"
          description: >
            An Attempt points to a missing Task or ContextSnapshot. Treat this
            as control-plane integrity damage and stop cutover progression.

      - alert: AINRFDomainIdempotencyConflict
        expr: increase(ainrf_domain_idempotency_requests_total{outcome="conflict"}[5m]) > 0
        labels:
          severity: warning
          component: domain-api
        annotations:
          summary: "Conflicting domain Idempotency-Key reuse"
          description: >
            A client supplied mismatched header/body idempotency keys. Review
            the caller without logging the key value itself.

      - alert: AINRFDomainSQLiteError
        expr: increase(ainrf_domain_sqlite_errors_total[5m]) > 0
        labels:
          severity: warning
          component: domain-database
        annotations:
          summary: "Domain control-plane SQLite error observed"
          description: >
            A domain SQLite connection or telemetry read failed. Inspect the
            structured error type and safe operation label before attempting
            recovery.

      - alert: AINRFDeprecatedDomainRouteUse
        # Until the Release-E controller binds a formal observation watermark,
        # this cumulative durable total fails closed. A first non-zero sample
        # must not disappear merely because it arrived before Prometheus had a
        # previous sample for `increase()`.
        expr: sum(ainrf_deprecated_route_calls_total) > 0
        labels:
          severity: warning
          component: compatibility
          release_gate: "E"
        annotations:
          summary: "Deprecated domain compatibility route was used"
          description: >
            Deprecated domain traffic is non-zero. Release E cleanup remains
            blocked until a future release controller binds a fresh formal
            observation watermark and proves its complete period is zero.

  - name: ainrf.sla
    rules:
      - alert: AINRFTaskCompletionSLABreach
        expr: |
          histogram_quantile(0.95,
            sum(rate(ainrf_sla_task_completion_seconds_bucket[1h])) by (le, status)
          ) > 1800
        for: 1h
        labels:
          severity: critical
          component: sla
        annotations:
          summary: "Task completion P95 exceeds 30-minute SLO"
          description: >
            The 95th percentile task completion latency has been above 30
            minutes for 1 hour. Current P95: {{ $value | printf "%.0f" }}s.

      - alert: AINRFLLMFirstTokenSLABreach
        expr: |
          histogram_quantile(0.99,
            sum(rate(ainrf_sla_llm_first_token_seconds_bucket[30m])) by (le)
          ) > 10
        for: 30m
        labels:
          severity: warning
          component: sla
        annotations:
          summary: "LLM first-token P99 exceeds 10-second SLO"
          description: >
            The 99th percentile LLM first-token latency has been above 10
            seconds for 30 minutes. Current P99: {{ $value | printf "%.1f" }}s.

      - alert: AINRFErrorBudgetBurn
        expr: |
          (
            sum(rate(ainrf_http_requests_total{status=~"5.."}[1h]))
            / sum(rate(ainrf_http_requests_total[1h]))
          ) > 0.072
        for: 1h
        labels:
          severity: critical
          component: sla
        annotations:
          summary: "Error budget burn rate exceeds 14.4x (critical)"
          description: >
            5xx error rate is burning the monthly error budget at >14.4x the
            sustainable rate. Investigate immediately.

      - alert: AINRFRateLimitSpike
        expr: |
          rate(ainrf_rate_limited_total[10m]) > 0.05
        for: 10m
        labels:
          severity: warning
          component: sla
        annotations:
          summary: "Rate-limited requests detected"
          description: >
            Rate-limited requests are occurring at {{ $value | printf "%.2f" }}
            per second. Reason: {{ $labels.reason }}. Path: {{ $labels.path }}.

  - name: ainrf.auth
    rules:
      - alert: AINRFHighLoginFailureRate
        expr: rate(ainrf_auth_login_failed_total[5m]) > 2
        for: 1m
        labels:
          severity: warning
          component: auth
        annotations:
          summary: "High login failure rate on OpenScience"
          description: >
            {{ $value }} login failures per second over the last 5 minutes.
            Possible brute-force attack. Check audit logs for details.

      - alert: AINRFAccountLockouts
        expr: rate(ainrf_auth_login_failed_total{reason="locked"}[5m]) > 0.1
        for: 2m
        labels:
          severity: info
          component: auth
        annotations:
          summary: "Account lockouts occurring on OpenScience"
          description: >
            {{ $value }} account lockout events per second. Users are being
            locked out due to repeated failed login attempts.

  - name: ainrf.terminal
    rules:
      - alert: AINRFTerminalExecDenials
        expr: rate(ainrf_terminal_exec_denied_total[5m]) > 1
        for: 1m
        labels:
          severity: warning
          component: terminal
        annotations:
          summary: "Terminal exec commands being denied"
          description: >
            {{ $value }} exec denials per second. May indicate unauthorized
            command attempts or policy violations.

  - name: ainrf.security
    rules:
      - alert: AINRFSensitiveFileAccess
        expr: rate(ainrf_files_sensitive_path_access_total[5m]) > 0.5
        for: 1m
        labels:
          severity: high
          component: security
        annotations:
          summary: "Sensitive file access detected on OpenScience"
          description: >
            {{ $value }} sensitive file access attempts per second. Check
            audit logs for which paths and users are involved.

  - name: ainrf.system
    rules:
      - alert: AINRFHighRequestRate
        expr: rate(ainrf_http_requests_total[1m]) > 100
        for: 2m
        labels:
          severity: warning
          component: system
        annotations:
          summary: "High HTTP request rate on OpenScience"
          description: >
            {{ $value }} requests per second. May indicate abuse or
            misconfigured clients.
