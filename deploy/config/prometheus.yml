# OpenScience Prometheus Scrape Configuration
# ────────────────────────────────────────
# Targets:
#   ainrf:8000  — OpenScience backend /metrics (Docker network mode)
#   localhost:8192 — OpenScience backend /metrics (host network mode)
#
# In host-network deployments, Prometheus runs in host network too,
# so it scrapes localhost:8192. In bridged deployments, it scrapes
# ainrf:8000 via Docker DNS.

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: "ainrf"

rule_files:
  - "/etc/prometheus/rules/*.yml"

scrape_configs:
  - job_name: "ainrf"
    metrics_path: /metrics
    static_configs:
      # Default: Docker network. Override with AINRF_PORT for host network.
      - targets: ["ainrf:8000"]
        labels:
          env: "production"
