# OpenScience Prometheus Scrape Configuration — Staging (Host Network)
# ────────────────────────────────────────────────────────────
# Staging backend serves /metrics on port 17000.

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: "ainrf-staging"

rule_files:
  - "/etc/prometheus/rules/*.yml"

scrape_configs:
  - job_name: "ainrf-staging"
    metrics_path: /metrics
    static_configs:
      - targets: ["localhost:17000"]
        labels:
          env: "staging"
