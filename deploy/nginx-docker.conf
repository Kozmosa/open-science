# ── AINRF Nginx config for Docker Compose ────────────────────────
#
# The upstream "ainrf" is resolved by Docker's embedded DNS.
# Place TLS cert at ./tls/cert.pem and key at ./tls/key.pem.
# ────────────────────────────────────────────────────────────────

geo $allowed_client {
    default         0;
    10.0.0.0/8     1;
    172.16.0.0/12  1;
    192.168.0.0/16 1;
    127.0.0.1      1;
}

map $allowed_client $deny_reason {
    0 "Forbidden";
    1 "";
}

server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name _;

    ssl_certificate     /etc/nginx/tls/cert.pem;
    ssl_certificate_key /etc/nginx/tls/key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    if ($allowed_client = 0) {
        return 403 $deny_reason;
    }

    add_header X-Frame-Options       DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection      "1; mode=block" always;
    add_header Referrer-Policy        strict-origin-when-cross-origin always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self' ws: wss:; font-src 'self'" always;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Block documentation endpoints at proxy level (defense in depth)
    location ~ ^/(docs|redoc|openapi.json) {
        return 404;
    }
    # Proxy /api/ routes to backend (explicit prefix match)
    location /api/ {
        proxy_pass http://ainrf:8000/api/;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Catch-all API routes that don't start with /api/
    location ~ ^/(auth|tasks|terminal|files|projects|workspaces|environments|sessions|literature|resources|settings|skills|health|admin|metrics|v1)/ {
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (terminal PTY, task SSE)
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
    # Internal auth-check endpoint for nginx auth_request
    location = /auth/check {
        proxy_pass http://ainrf:8000/auth/check;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header X-Original-URI $request_uri;
    }

    # Auth-gated Grafana monitoring dashboard
    location /monitoring/ {
        auth_request /auth/check;
        auth_request_set $remote_user $upstream_http_x_remote_user;
        auth_request_set $remote_user_role $upstream_http_x_remote_user_role;

        proxy_pass http://grafana:3000/;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-WEBAUTH-USER    $remote_user;

        # WebSocket for Grafana live
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
    }


    client_max_body_size 100m;
}
