# ══════════════════════════════════════════════════════════════════
# AINRF Production Deployment — Docker Compose
# ══════════════════════════════════════════════════════════════════
#
# Usage:
#   1. Copy .env.example → .env, fill in secrets
#   2. Place TLS cert + key in ./tls/cert.pem, ./tls/key.pem
#      (or use deploy/tls/generate-self-signed.sh for lab)
#   3. docker compose up -d
#
# Architecture:
#   nginx (TLS + static files + reverse proxy)
#     → ainrf (FastAPI backend, port 8000, not exposed)
# Named volumes (all persistent data):
#   ainrf-state       → /opt/ainrf/state            (databases, config, logs)
#   ainrf-workspaces  → /opt/ainrf/.ainrf_workspaces (user workspaces)
#   ainrf-tenants     → /home/ainrf_tenants          (tenant home dirs)
#   frontend-dist     → shared frontend static files
#
# Agent tool config:
#   ANTHROPIC_API_KEY, ANTHROPIC_BASE_URL, ANTHROPIC_MODEL — Claude agent
#   CODEX_API_KEY, CODEX_BASE_URL, CODEX_MODEL — Codex/OpenAI agent
#   Set in .env or environment; defaults are provided where possible.
#
# All persistent data lives in named volumes — never in the container filesystem.
# ══════════════════════════════════════════════════════════════════

services:
  # ── AINRF Backend ──────────────────────────────────────────────
  ainrf:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      args:
        AINRF_BUILD_COMMIT: ${AINRF_BUILD_COMMIT:-}
        AINRF_BUILD_COMMITTED_AT: ${AINRF_BUILD_COMMITTED_AT:-}
    restart: unless-stopped
    container_name: ainrf
    environment:
      HOME: /opt/ainrf
      AINRF_PRODUCTION: "1"
      AINRF_JWT_SECRET: ${AINRF_JWT_SECRET:?Set AINRF_JWT_SECRET in .env}
      AINRF_API_KEY_HASHES: ${AINRF_API_KEY_HASHES:?Set AINRF_API_KEY_HASHES in .env}
      AINRF_ALLOWED_CIDRS: "0.0.0.0/0"
      AINRF_TRUSTED_PROXY_CIDRS: "172.16.0.0/12"
      AINRF_PUBLIC_REGISTRATION_ENABLED: ${AINRF_PUBLIC_REGISTRATION_ENABLED:-false}
      AINRF_LOGIN_MAX_FAILURES: "10"
      AINRF_LOGIN_LOCKOUT_HOURS: "24"
      AINRF_MAX_CONCURRENT_REQUESTS: "100"
      AINRF_METRICS_ENABLED: "true"
      # ── Monitoring / observability dashboard links (browser-facing) ──
      AINRF_MONITORING_GRAFANA_URL: ${AINRF_MONITORING_GRAFANA_URL:-/grafana}
      AINRF_MONITORING_PROMETHEUS_URL: ${AINRF_MONITORING_PROMETHEUS_URL:-/prometheus}
      AINRF_MONITORING_LITEFUSE_URL: ${AINRF_MONITORING_LITEFUSE_URL:-/litefuse}
      # ── Agent tool configuration ─────────────────────────────
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_BASE_URL: ${ANTHROPIC_BASE_URL:-https://api.anthropic.com}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-sonnet-4-6}
      CODEX_API_KEY: ${CODEX_API_KEY:-}
      CODEX_BASE_URL: ${CODEX_BASE_URL:-https://api.openai.com/v1}
      CODEX_MODEL: ${CODEX_MODEL:-gpt-5.5}
      # ── LLM Observability (Litefuse) ────────────────────────
      AINRF_OBSERVABILITY_ENABLED: ${AINRF_OBSERVABILITY_ENABLED:-false}
      AINRF_OBSERVABILITY_BASE_URL: ${AINRF_OBSERVABILITY_BASE_URL:-http://litefuse-web:3000}
      AINRF_OBSERVABILITY_SECRET_KEY: ${AINRF_OBSERVABILITY_SECRET_KEY:-}
      AINRF_OBSERVABILITY_PUBLIC_KEY: ${AINRF_OBSERVABILITY_PUBLIC_KEY:-}
    volumes:
      - ainrf-state:/opt/ainrf/state
      - ainrf-workspaces:/opt/ainrf/.ainrf_workspaces
      - ainrf-tenants:/home/ainrf_tenants
      - frontend-dist:/opt/ainrf/frontend/dist
    cap_add:
      - SYS_ADMIN
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 2G
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # ── Nginx Reverse Proxy ───────────────────────────────────────
  nginx:
    image: docker.1ms.run/nginx:1.27-alpine
    restart: unless-stopped
    container_name: ainrf-nginx
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ../deploy/nginx-docker.conf:/etc/nginx/conf.d/default.conf:ro
      - ./tls:/etc/nginx/tls:ro
      - frontend-dist:/usr/share/nginx/html:ro
    depends_on:
      ainrf:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:80"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Prometheus ─────────────────────────────────────────────────
  prometheus:
    image: docker.1ms.run/prom/prometheus:v3.3.1
    restart: unless-stopped
    container_name: ainrf-prometheus
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./examples/prometheus-rules.example.yml:/etc/prometheus/rules/ainrf.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
      - "--storage.tsdb.retention.size=2GB"
      - "--web.enable-remote-write-receiver"
      - "--web.external-url=/prometheus"
      - "--web.route-prefix=/prometheus"
    depends_on:
      ainrf:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── Grafana ────────────────────────────────────────────────────
  grafana:
    image: docker.1ms.run/grafana/grafana:11.6.1
    restart: unless-stopped
    container_name: ainrf-grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-ainrf-grafana}
      GF_SERVER_ROOT_URL: "%(protocol)s://%(domain)s/grafana/"
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_AUTH_PROXY_ENABLED: "true"
      GF_AUTH_PROXY_HEADER: "X-WEBAUTH-USER"
      GF_AUTH_PROXY_AUTO_SIGN_UP: "true"
    volumes:
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./config/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    expose:
      - "3000"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  ainrf-state:
  ainrf-workspaces:
  ainrf-tenants:
  frontend-dist:
  prometheus-data:
  grafana-data: