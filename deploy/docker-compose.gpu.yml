# ══════════════════════════════════════════════════════════════════
# AINRF GPU Lab — Docker Compose
# ══════════════════════════════════════════════════════════════════
#
# 适用于：无 root 权限、有 Docker 权限、需要 GPU 透传的实验室机器。
#
# 使用方法：
#   1. 生成密钥
#      python3 -c "import secrets; print(secrets.token_urlsafe(48))"  # → JWT_SECRET
#      python3 -c "import secrets; print(secrets.token_urlsafe(32))"  # → API_KEY
#      python3 -c "from hashlib import sha256; print(sha256(b'你的API_KEY').hexdigest())"  # → API_KEY_HASHES
#
#   2. 编辑本文件，把 <CHANGE_ME> 替换为上面生成的值
#
#   3. 构建并启动
#      docker compose -f docker-compose.gpu.yml up -d --build
#
#   4. 查看日志
#      docker compose -f docker-compose.gpu.yml logs -f ainrf
#
#   5. 首次启动后获取 admin 密码
#      docker compose -f docker-compose.gpu.yml exec ainrf cat /opt/ainrf/state/admin_initial_password.txt
#
#   6. 访问
#      http://<宿主机IP>:8192/
#
# ══════════════════════════════════════════════════════════════════

services:
  ainrf:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    restart: unless-stopped
    container_name: ainrf
    ports:
      - "8192:8000"
    environment:
      HOME: /opt/ainrf
      AINRF_PRODUCTION: "1"
      # ── 必填：在 .env 文件中设置（见 deploy/examples/ainrf.env.example）──
      AINRF_JWT_SECRET: ${AINRF_JWT_SECRET:?在 .env 中设置 AINRF_JWT_SECRET}
      AINRF_API_KEY_HASHES: ${AINRF_API_KEY_HASHES:?在 .env 中设置 AINRF_API_KEY_HASHES}
      # ── 安全 ────────────────────────────────────────────
      AINRF_PUBLIC_REGISTRATION_ENABLED: ${AINRF_PUBLIC_REGISTRATION_ENABLED:-false}
      AINRF_LOGIN_MAX_FAILURES: "10"
      AINRF_LOGIN_LOCKOUT_HOURS: "24"
      AINRF_MAX_CONCURRENT_REQUESTS: "100"
      AINRF_METRICS_ENABLED: "true"
      # ── Agent 工具配置（在 .env 中设置）──
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_BASE_URL: ${ANTHROPIC_BASE_URL:-https://api.anthropic.com}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-sonnet-4-6}
      CODEX_API_KEY: ${CODEX_API_KEY:-}
      CODEX_BASE_URL: ${CODEX_BASE_URL:-https://api.openai.com/v1}
      CODEX_MODEL: ${CODEX_MODEL:-gpt-5.5}
    volumes:
      - ./data/state:/opt/ainrf/state
      - ./data/workspaces:/opt/ainrf/.ainrf_workspaces
      - ./data/tenants:/home/ainrf_tenants
    cap_add:
      - SYS_ADMIN
    # ── GPU 全透传 ────────────────────────────────────────
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
        limits:
          memory: 8G
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  prometheus:
    image: docker.1ms.run/prom/prometheus:v3.3.1
    restart: unless-stopped
    container_name: ainrf-prometheus
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./examples/prometheus-rules.example.yml:/etc/prometheus/rules/ainrf.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
      - "--storage.tsdb.retention.size=2GB"
      - "--web.enable-remote-write-receiver"
    depends_on:
      ainrf:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  grafana:
    image: docker.1ms.run/grafana/grafana:11.6.1
    restart: unless-stopped
    container_name: ainrf-grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-ainrf-grafana}
      GF_SERVER_HTTP_PORT: "3000"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/ainrf/ainrf-overview.json
    ports:
      - "3000:3000"
    volumes:
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./config/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  prometheus-data:
  grafana-data: