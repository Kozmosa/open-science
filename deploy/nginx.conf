# ── AINRF Nginx reverse proxy ──────────────────────────────────────
#
# Usage:
#   1. Copy to /etc/nginx/sites-available/ainrf
#   2. Edit ALLOWED_CIDR, server_name, and ssl_certificate paths
#   3. ln -s /etc/nginx/sites-available/ainrf /etc/nginx/sites-enabled/
#   4. nginx -t && systemctl reload nginx
#
# The backend must listen on 127.0.0.1:8000 (default).
# ──────────────────────────────────────────────────────────────────

# ----- EDIT THESE VALUES -----
# IP/CIDR ranges allowed to reach the application (comma-separated).
# Only lab/internal networks should be listed here.
# Example: 10.0.0.0/8, 192.168.1.0/24
geo $allowed_client {
    default         0;
    10.0.0.0/8     1;     # Private Class A (edit to your lab subnet)
    172.16.0.0/12  1;     # Private Class B
    192.168.0.0/16 1;     # Private Class C
    127.0.0.1      1;     # Localhost
}

# Map to choose the right variable (avoids if-in-location)
map $allowed_client $deny_reason {
    0 "Forbidden";
    1 "";
}

server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name _;  # <-- Replace with your hostname

    # ── TLS ────────────────────────────────────────────────────
    # Self-signed for lab use; replace with real certs if available.
    ssl_certificate     /etc/ssl/certs/ainrf-lab.pem;
    ssl_certificate_key /etc/ssl/private/ainrf-lab.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # ── IP allowlist ───────────────────────────────────────────
    if ($allowed_client = 0) {
        return 403 $deny_reason;
    }

    # ── Security headers ───────────────────────────────────────
    add_header X-Frame-Options       DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection      "1; mode=block" always;
    add_header Referrer-Policy        strict-origin-when-cross-origin always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self' ws: wss:; font-src 'self'" always;

    # ── Static frontend ────────────────────────────────────────
    # Serve the Vite build output directly.
    root /opt/ainrf/frontend/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively (Vite hashes filenames).
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── Block sensitive endpoints at the proxy level ────────────
    # These are also disabled in FastAPI production mode, but block
    # them here as defense in depth.
    location ~ ^/(docs|redoc|openapi.json) {
        return 404;
    }

    # ── API reverse proxy ──────────────────────────────────────
    location /api/ {
        proxy_pass http://127.0.0.1:8000/api/;
    }

    # Catch-all API routes that don't start with /api/ (the backend
    # mounts routes like /auth, /tasks, /terminal, /v1, etc.)
    location ~ ^/(auth|tasks|terminal|files|projects|workspaces|environments|sessions|literature|resources|settings|skills|health|admin|v1)/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (terminal PTY, task streams).
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ── Max upload size ────────────────────────────────────────
    client_max_body_size 100m;
}
