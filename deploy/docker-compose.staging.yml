name: openscience-staging

# ══════════════════════════════════════════════════════════════════
# OpenScience Staging — Docker Compose (host network, hot-reload)
# ══════════════════════════════════════════════════════════════════
#
# Mirrors the production docker-compose.cpu.yml topology with offset
# ports and isolated volumes so staging never touches production data.
#
# Backend hot-reload: src/ainrf/ is bind-mounted (read-only) over the
# installed package, and uvicorn runs with --reload. Code changes on
# the host take effect automatically — no image rebuild needed.
#
# Usage:
#   OPENSCIENCE_STAGING_ENV_FILE=/secure/path/staging.env bash scripts/staging.sh up
#                                       # build + start, wait for healthy
#   OPENSCIENCE_STAGING_ENV_FILE=/secure/path/staging.env bash scripts/staging.sh status
#   OPENSCIENCE_STAGING_ENV_FILE=/secure/path/staging.env bash scripts/staging.sh logs
#   OPENSCIENCE_STAGING_ENV_FILE=/secure/path/staging.env bash scripts/staging.sh down
#                                       # stop containers, preserve isolated data
#   OPENSCIENCE_STAGING_ENV_FILE=/secure/path/staging.env OPENSCIENCE_STAGING_ALLOW_VOLUME_REMOVAL=1 bash scripts/staging.sh purge
#                                       # explicitly remove isolated data
#   OPENSCIENCE_STAGING_ENV_FILE=/secure/path/staging.env bash scripts/staging.sh rebuild
#
# Or directly:
#   docker compose --env-file /secure/path/staging.env \
#     -f deploy/docker-compose.staging.yml up -d --build
#
# Port mapping (staging ↔ production):
#   nginx       :7192  (prod :8192)
#   backend     :17000 (prod :18000)
#   sshd        :2223  (prod :2222)
#   prometheus  :9092  (prod :9091)
#   grafana     :2300  (prod :3000)
#
# ══════════════════════════════════════════════════════════════════

services:
  ainrf-staging:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      args:
        AINRF_BUILD_COMMIT: ${AINRF_BUILD_COMMIT:-}
        AINRF_BUILD_COMMITTED_AT: ${AINRF_BUILD_COMMITTED_AT:-}
    restart: unless-stopped
    container_name: ainrf-staging
    network_mode: host
    environment:
      OPENSCIENCE_PRODUCTION: "1"
      AINRF_STAGING: "1"
      # Staging clone smoke must not expose a host-network SSH listener or
      # accept credentials copied with a source state.  Operators can make a
      # deliberate, isolated opt-in for a disposable runtime exercise.
      OPENSCIENCE_NO_SSHD: ${STAGING_OPENSCIENCE_NO_SSHD:-1}
      OPENSCIENCE_AUTH_COOKIE_NAMESPACE: "staging"
      AINRF_HOST: "127.0.0.1"
      AINRF_PORT: "17000"
      # A copied source is restored to a child generation.  The wrapper
      # accepts only `/opt/ainrf/state` or a validated child path, avoiding a
      # destructive move into the named-volume root.
      OPENSCIENCE_STATE_ROOT: ${STAGING_OPENSCIENCE_STATE_ROOT:-/opt/ainrf/state}
      AINRF_STATE_ROOT: ${STAGING_OPENSCIENCE_STATE_ROOT:-/opt/ainrf/state}
      # Staging retains an independent legacy default and never inherits a
      # production cutover token through the host environment.
      OPENSCIENCE_DOMAIN_MODEL_MODE: ${STAGING_OPENSCIENCE_DOMAIN_MODEL_MODE:-legacy}
      OPENSCIENCE_DOMAIN_ARTIFACT_SHA: ${STAGING_OPENSCIENCE_DOMAIN_ARTIFACT_SHA:-}
      # A copied production state is an isolated development fixture.  Do not
      # automatically SSH/tmux reconcile or poll any copied remote
      # Environment; an operator must explicitly opt in for runtime testing.
      OPENSCIENCE_RUNTIME_RECONCILIATION_ENABLED: ${STAGING_OPENSCIENCE_RUNTIME_RECONCILIATION_ENABLED:-false}
      # ── 必填：只能使用 staging 独立凭据，绝不继承生产 .env ──
      OPENSCIENCE_JWT_SECRET: ${STAGING_OPENSCIENCE_JWT_SECRET:?Set STAGING_OPENSCIENCE_JWT_SECRET in the staging env file}
      OPENSCIENCE_API_KEY_HASHES: ${STAGING_OPENSCIENCE_API_KEY_HASHES:?Set STAGING_OPENSCIENCE_API_KEY_HASHES in the staging env file}
      AINRF_JWT_SECRET: ${STAGING_OPENSCIENCE_JWT_SECRET:?Set STAGING_OPENSCIENCE_JWT_SECRET in the staging env file}
      AINRF_API_KEY_HASHES: ${STAGING_OPENSCIENCE_API_KEY_HASHES:?Set STAGING_OPENSCIENCE_API_KEY_HASHES in the staging env file}
      # ── 安全 ────────────────────────────────────────────
      AINRF_PUBLIC_REGISTRATION_ENABLED: ${STAGING_PUBLIC_REGISTRATION:-false}
      OPENSCIENCE_INTERACTIVE_AUTH_ENABLED: ${STAGING_OPENSCIENCE_INTERACTIVE_AUTH_ENABLED:-false}
      AINRF_LOGIN_MAX_FAILURES: ${STAGING_LOGIN_MAX_FAILURES:-10}
      AINRF_LOGIN_LOCKOUT_HOURS: ${STAGING_LOGIN_LOCKOUT_HOURS:-24}
      AINRF_METRICS_ENABLED: "true"
      # ── SSH / Container (offset port for host-network isolation) ──
      AINRF_SSHD_PORT: "2223"
      AINRF_CONTAINER_HOST: "127.0.0.1"
      AINRF_CONTAINER_PORT: "2223"
      AINRF_CONTAINER_USER: "root"
      AINRF_CONTAINER_SSH_KEY_PATH: "/opt/ainrf/.ssh/ainrf_local"
      # ── Monitoring / observability dashboard links (browser-facing) ──
      AINRF_MONITORING_GRAFANA_URL: ${STAGING_AINRF_MONITORING_GRAFANA_URL:-/grafana}
      AINRF_MONITORING_PROMETHEUS_URL: ${STAGING_AINRF_MONITORING_PROMETHEUS_URL:-/prometheus}
      AINRF_MONITORING_LITEFUSE_URL: ${STAGING_AINRF_MONITORING_LITEFUSE_URL:-/litefuse/}
      # ── LLM Observability (disabled by default) ──
      AINRF_OBSERVABILITY_ENABLED: ${STAGING_AINRF_OBSERVABILITY_ENABLED:-false}
      AINRF_OBSERVABILITY_BASE_URL: ${STAGING_AINRF_OBSERVABILITY_BASE_URL:-}
      AINRF_OBSERVABILITY_SECRET_KEY: ${STAGING_AINRF_OBSERVABILITY_SECRET_KEY:-}
      AINRF_OBSERVABILITY_PUBLIC_KEY: ${STAGING_AINRF_OBSERVABILITY_PUBLIC_KEY:-}
      # ── Agent 工具配置（在 .env 中设置）──
      # Never inherit production provider credentials into a staging clone.
      ANTHROPIC_API_KEY: ${STAGING_ANTHROPIC_API_KEY:-}
      ANTHROPIC_BASE_URL: ${STAGING_ANTHROPIC_BASE_URL:-https://api.anthropic.com}
      ANTHROPIC_MODEL: ${STAGING_ANTHROPIC_MODEL:-claude-sonnet-4-6}
      CODEX_API_KEY: ${STAGING_CODEX_API_KEY:-}
      CODEX_BASE_URL: ${STAGING_CODEX_BASE_URL:-https://api.openai.com/v1}
      CODEX_MODEL: ${STAGING_CODEX_MODEL:-gpt-5.5}
    volumes:
      - staging-ainrf-state:/opt/ainrf/state
      - staging-ainrf-workspaces:/opt/ainrf/.ainrf_workspaces
      - staging-ainrf-tenants:/home/ainrf_tenants
      # Hot-reload: mount host source over the installed package.
      # uvicorn --reload watches this directory for changes.
      - ../src/ainrf/:/usr/local/lib/python3.13/site-packages/ainrf/:ro
    # Override CMD: uvicorn with --reload instead of the default OpenScience server command.
    # ENTRYPOINT (entrypoint.py) still runs — provisions tenants, generates
    # agent configs, starts sshd, drops privileges — then execs this CMD.
    command:
      - "sh"
      - "-c"
      - >-
        python -m uvicorn ainrf.api:create_app --factory
        --host 127.0.0.1 --port 17000
        --reload --reload-dir /usr/local/lib/python3.13/site-packages/ainrf
    cap_add:
      - SYS_ADMIN
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    deploy:
      resources:
        limits:
          cpus: "8.0"
          memory: 4G
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:17000/health')"]
      interval: 15s
      retries: 5
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # Explicit v2-only no-port worker.  It reuses the staging API's host-network
  # sshd on :2223 and cannot start a second listener in the same namespace.
  domain-worker-staging:
    profiles: ["domain-v2"]
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      args:
        AINRF_BUILD_COMMIT: ${AINRF_BUILD_COMMIT:-}
        AINRF_BUILD_COMMITTED_AT: ${AINRF_BUILD_COMMITTED_AT:-}
    restart: unless-stopped
    container_name: openscience-staging-domain-worker
    network_mode: host
    environment:
      HOME: /opt/ainrf
      OPENSCIENCE_PRODUCTION: "1"
      AINRF_STAGING: "1"
      OPENSCIENCE_STATE_ROOT: ${STAGING_OPENSCIENCE_STATE_ROOT:-/opt/ainrf/state}
      AINRF_STATE_ROOT: ${STAGING_OPENSCIENCE_STATE_ROOT:-/opt/ainrf/state}
      OPENSCIENCE_DOMAIN_MODEL_MODE: ${STAGING_OPENSCIENCE_DOMAIN_MODEL_MODE:-legacy}
      OPENSCIENCE_DOMAIN_ARTIFACT_SHA: ${STAGING_OPENSCIENCE_DOMAIN_ARTIFACT_SHA:-}
      OPENSCIENCE_NO_SSHD: "1"
      AINRF_CONTAINER_HOST: "127.0.0.1"
      AINRF_CONTAINER_PORT: "2223"
      AINRF_CONTAINER_USER: "root"
      AINRF_CONTAINER_SSH_KEY_PATH: "/opt/ainrf/.ssh/ainrf_local"
      # A domain worker may start runtimes; it must never inherit provider
      # credentials from the production host, even when an operator enables
      # the explicit domain-v2 profile for a disposable fixture.
      ANTHROPIC_API_KEY: ${STAGING_ANTHROPIC_API_KEY:-}
      ANTHROPIC_BASE_URL: ${STAGING_ANTHROPIC_BASE_URL:-https://api.anthropic.com}
      ANTHROPIC_MODEL: ${STAGING_ANTHROPIC_MODEL:-claude-sonnet-4-6}
      CODEX_API_KEY: ${STAGING_CODEX_API_KEY:-}
      CODEX_BASE_URL: ${STAGING_CODEX_BASE_URL:-https://api.openai.com/v1}
      CODEX_MODEL: ${STAGING_CODEX_MODEL:-gpt-5.5}
    volumes:
      - staging-ainrf-state:/opt/ainrf/state
      - staging-ainrf-workspaces:/opt/ainrf/.ainrf_workspaces
      - staging-ainrf-tenants:/home/ainrf_tenants
      - ../src/ainrf/:/usr/local/lib/python3.13/site-packages/ainrf/:ro
    cap_add:
      - SYS_ADMIN
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    command: ["openscience", "domain-worker", "--state-root", "${STAGING_OPENSCIENCE_STATE_ROOT:-/opt/ainrf/state}"]
    depends_on:
      ainrf-staging:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  literature-redis-staging:
    # Background workers are opt-in.  A staging production snapshot must not
    # consume copied durable work or make external Literature requests.
    profiles: ["background-workers"]
    image: docker.1ms.run/redis:7-alpine
    restart: unless-stopped
    container_name: openscience-staging-literature-redis
    network_mode: host
    environment:
      OPENSCIENCE_LITERATURE_REDIS_PASSWORD: ${STAGING_OPENSCIENCE_LITERATURE_REDIS_PASSWORD:?Set STAGING_OPENSCIENCE_LITERATURE_REDIS_PASSWORD in .env}
    command:
      - redis-server
      - --bind
      - 127.0.0.1
      - --port
      - "17379"
      - --appendonly
      - "yes"
      - --appendfsync
      - everysec
      - --maxmemory-policy
      - noeviction
      - --requirepass
      - ${STAGING_OPENSCIENCE_LITERATURE_REDIS_PASSWORD:?Set STAGING_OPENSCIENCE_LITERATURE_REDIS_PASSWORD in .env}
    volumes:
      - staging-literature-redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$OPENSCIENCE_LITERATURE_REDIS_PASSWORD\" ping"]
      interval: 15s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  literature-worker-staging:
    profiles: ["background-workers"]
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    restart: unless-stopped
    container_name: openscience-staging-literature-worker
    network_mode: host
    environment:
      OPENSCIENCE_NO_SSHD: "1"
      OPENSCIENCE_STATE_ROOT: ${STAGING_OPENSCIENCE_STATE_ROOT:-/opt/ainrf/state}
      AINRF_STATE_ROOT: ${STAGING_OPENSCIENCE_STATE_ROOT:-/opt/ainrf/state}
      OPENSCIENCE_LITERATURE_REDIS_URL: redis://:${STAGING_OPENSCIENCE_LITERATURE_REDIS_PASSWORD:?Set STAGING_OPENSCIENCE_LITERATURE_REDIS_PASSWORD in .env}@127.0.0.1:17379/0
      OPENSCIENCE_LITERATURE_REDIS_NAMESPACE: openscience:staging:literature
      OPENSCIENCE_LITERATURE_REQUEST_INTERVAL_SECONDS: "3"
      OPENSCIENCE_LITERATURE_DAILY_SOURCE_BUDGET: "24"
      OPENSCIENCE_LITERATURE_DAILY_SEARCH_BUDGET: "8"
      ANTHROPIC_API_KEY: ${STAGING_ANTHROPIC_API_KEY:-}
      ANTHROPIC_BASE_URL: ${STAGING_ANTHROPIC_BASE_URL:-https://api.anthropic.com}
      ANTHROPIC_MODEL: ${STAGING_ANTHROPIC_MODEL:-claude-sonnet-4-6}
    volumes:
      - staging-ainrf-state:/opt/ainrf/state
      - ../src/ainrf/:/usr/local/lib/python3.13/site-packages/ainrf/:ro
    command: ["dramatiq", "ainrf.literature.tasks", "--processes", "1", "--threads", "2"]
    depends_on:
      ainrf-staging:
        condition: service_healthy
      literature-redis-staging:
        condition: service_healthy

  literature-planner-staging:
    profiles: ["background-workers"]
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    restart: unless-stopped
    container_name: openscience-staging-literature-planner
    network_mode: host
    environment:
      OPENSCIENCE_NO_SSHD: "1"
      OPENSCIENCE_STATE_ROOT: ${STAGING_OPENSCIENCE_STATE_ROOT:-/opt/ainrf/state}
      AINRF_STATE_ROOT: ${STAGING_OPENSCIENCE_STATE_ROOT:-/opt/ainrf/state}
      OPENSCIENCE_LITERATURE_REDIS_URL: redis://:${STAGING_OPENSCIENCE_LITERATURE_REDIS_PASSWORD:?Set STAGING_OPENSCIENCE_LITERATURE_REDIS_PASSWORD in .env}@127.0.0.1:17379/0
      OPENSCIENCE_LITERATURE_REDIS_NAMESPACE: openscience:staging:literature
    volumes:
      - staging-ainrf-state:/opt/ainrf/state
      - ../src/ainrf/:/usr/local/lib/python3.13/site-packages/ainrf/:ro
    command: ["python", "-m", "ainrf.literature.planner"]
    depends_on:
      ainrf-staging:
        condition: service_healthy
      literature-redis-staging:
        condition: service_healthy

  nginx-staging:
    image: docker.1ms.run/nginx:1.27-alpine
    restart: unless-stopped
    container_name: ainrf-staging-nginx
    network_mode: host
    volumes:
      - ./config/nginx-staging.conf:/etc/nginx/conf.d/default.conf:ro
      - ../frontend/dist/staging:/usr/share/nginx/html:ro
    depends_on:
      ainrf-staging:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:7192/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  prometheus-staging:
    image: docker.1ms.run/prom/prometheus:v3.3.1
    restart: unless-stopped
    container_name: ainrf-staging-prometheus
    network_mode: host
    volumes:
      - ./config/prometheus-staging.yml:/etc/prometheus/prometheus.yml:ro
      - ./config/prometheus/rules/ainrf-alerts.yml:/etc/prometheus/rules/ainrf.yml:ro
      - staging-prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"
      - "--storage.tsdb.retention.size=1GB"
      - "--web.listen-address=127.0.0.1:9092"
      - "--web.external-url=/prometheus"
      - "--web.route-prefix=/prometheus"
    depends_on:
      ainrf-staging:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  grafana-staging:
    image: docker.1ms.run/grafana/grafana:11.6.1
    restart: unless-stopped
    container_name: ainrf-staging-grafana
    network_mode: host
    environment:
      # Grafana has its own authentication boundary.  Staging must require
      # separate credentials instead of silently inheriting the host's
      # production GRAFANA_ADMIN_* variables or a default password.
      GF_SECURITY_ADMIN_USER: ${STAGING_GRAFANA_ADMIN_USER:?Set STAGING_GRAFANA_ADMIN_USER in the staging env file}
      GF_SECURITY_ADMIN_PASSWORD: ${STAGING_GRAFANA_ADMIN_PASSWORD:?Set STAGING_GRAFANA_ADMIN_PASSWORD in the staging env file}
      GF_SERVER_HTTP_ADDR: "127.0.0.1"
      GF_SERVER_HTTP_PORT: "2300"
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
      GF_SERVER_ROOT_URL: "${STAGING_GRAFANA_ROOT_URL:-http://localhost:7192/grafana}"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_AUTH_PROXY_ENABLED: "true"
      GF_AUTH_PROXY_HEADER: "X-WEBAUTH-USER"
      GF_AUTH_PROXY_AUTO_SIGN_UP: "true"
    volumes:
      - ./config/grafana/provisioning-staging/datasources:/etc/grafana/provisioning/datasources:ro
      - ./config/grafana/provisioning-staging/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./config/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - staging-grafana-data:/var/lib/grafana
    depends_on:
      - prometheus-staging
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  staging-ainrf-state:
    name: ${OPENSCIENCE_STAGING_STATE_VOLUME:-openscience-staging_staging-ainrf-state}
  staging-ainrf-workspaces:
    name: ${OPENSCIENCE_STAGING_WORKSPACES_VOLUME:-openscience-staging_staging-ainrf-workspaces}
  staging-ainrf-tenants:
    name: ${OPENSCIENCE_STAGING_TENANTS_VOLUME:-openscience-staging_staging-ainrf-tenants}
  staging-prometheus-data:
  staging-grafana-data:
  staging-literature-redis-data:
