name: deploy

# ══════════════════════════════════════════════════════════════════
# OpenScience CPU-only — Docker Compose (host network)
# ══════════════════════════════════════════════════════════════════
#
# 适用于：无 GPU、宿主机 iptables FORWARD 受限（无法使用 Docker NAT 端口映射）。
# 使用 host 网络模式，容器直接监听宿主机网卡，绕过 Docker NAT。
#
# 使用方法：
#   1. 生成密钥
#      python3 -c "import secrets; print(secrets.token_urlsafe(48))"  # → JWT_SECRET
#      python3 -c "import secrets; print(secrets.token_urlsafe(32))"  # → API_KEY
#      python3 -c "from hashlib import sha256; print(sha256(b'你的API_KEY').hexdigest())"  # → API_KEY_HASHES
#
#   2. 编辑本文件，把 <CHANGE_ME> 替换为上面生成的值
#
#   3. 构建并启动
#      docker compose -f docker-compose.cpu.yml up -d --build
#
#   4. 查看日志
#      docker compose -f docker-compose.cpu.yml logs -f ainrf
#
#   5. 首次启动后获取 admin 密码
#      docker compose -f docker-compose.cpu.yml exec ainrf cat /opt/ainrf/state/admin_initial_password.txt
#
#   6. 访问
#      http://<宿主机IP>:8192/
#
# ══════════════════════════════════════════════════════════════════

services:
  ainrf:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      args:
        # Host git commit captured by deploy/redeploy-backend.sh (falls back to
        # empty -> backend reports "Unavailable" when built without the wrapper).
        AINRF_BUILD_COMMIT: ${AINRF_BUILD_COMMIT:-}
        AINRF_BUILD_COMMITTED_AT: ${AINRF_BUILD_COMMITTED_AT:-}
    restart: unless-stopped
    container_name: ainrf
    network_mode: host
    environment:
      AINRF_PRODUCTION: "1"
      AINRF_HOST: "127.0.0.1"
      AINRF_PORT: "18000"
      # ── 必填：在 .env 文件中设置（见 deploy/examples/ainrf.env.example）──
      AINRF_JWT_SECRET: ${AINRF_JWT_SECRET:?在 .env 中设置 AINRF_JWT_SECRET}
      AINRF_API_KEY_HASHES: ${AINRF_API_KEY_HASHES:?在 .env 中设置 AINRF_API_KEY_HASHES}
      # ── 安全 ────────────────────────────────────────────
      AINRF_PUBLIC_REGISTRATION_ENABLED: ${AINRF_PUBLIC_REGISTRATION_ENABLED:-false}
      AINRF_LOGIN_MAX_FAILURES: "10"
      AINRF_LOGIN_LOCKOUT_HOURS: "24"
      AINRF_MAX_CONCURRENT_REQUESTS: "100"
      AINRF_METRICS_ENABLED: "true"
      # ── Monitoring / observability dashboard links (browser-facing) ──
      # Defaults are relative paths that work through nginx on port 8192.
      # Set to a fully-qualified URL if services are accessed externally.
      # Set to "" (empty) to hide a service card in the frontend.
      AINRF_MONITORING_GRAFANA_URL: ${AINRF_MONITORING_GRAFANA_URL:-/grafana}
      AINRF_MONITORING_PROMETHEUS_URL: ${AINRF_MONITORING_PROMETHEUS_URL:-/prometheus}
      AINRF_MONITORING_LITEFUSE_URL: ${AINRF_MONITORING_LITEFUSE_URL:-/litefuse/}
      # ── LLM Observability (Litefuse overlay, disabled by default) ──
      AINRF_OBSERVABILITY_ENABLED: ${AINRF_OBSERVABILITY_ENABLED:-false}
      AINRF_OBSERVABILITY_BASE_URL: ${AINRF_OBSERVABILITY_BASE_URL:-http://localhost:13000}
      AINRF_OBSERVABILITY_SECRET_KEY: ${AINRF_OBSERVABILITY_SECRET_KEY:-}
      AINRF_OBSERVABILITY_PUBLIC_KEY: ${AINRF_OBSERVABILITY_PUBLIC_KEY:-}
      # ── Agent 工具配置（在 .env 中设置）──
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_BASE_URL: ${ANTHROPIC_BASE_URL:-https://api.anthropic.com}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-sonnet-4-6}
      CODEX_API_KEY: ${CODEX_API_KEY:-}
      CODEX_BASE_URL: ${CODEX_BASE_URL:-https://api.openai.com/v1}
      CODEX_MODEL: ${CODEX_MODEL:-gpt-5.5}
    volumes:
      - ainrf-state:/opt/ainrf/state
      - ainrf-workspaces:/opt/ainrf/.ainrf_workspaces
      - ainrf-tenants:/home/ainrf_tenants
    cap_add:
      - SYS_ADMIN
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    deploy:
      resources:
        limits:
          memory: 8G
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:18000/health')"]
      interval: 30s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  prometheus:
    image: docker.1ms.run/prom/prometheus:v3.3.1
    restart: unless-stopped
    container_name: ainrf-prometheus
    network_mode: host
    volumes:
      - ./config/prometheus-host.yml:/etc/prometheus/prometheus.yml:ro
      - ./examples/prometheus-rules.example.yml:/etc/prometheus/rules/ainrf.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
      - "--storage.tsdb.retention.size=2GB"
      - "--web.listen-address=127.0.0.1:9091"
      - "--web.external-url=/prometheus"
      - "--web.route-prefix=/prometheus"
    depends_on:
      ainrf:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  grafana:
    image: docker.1ms.run/grafana/grafana:11.6.1
    restart: unless-stopped
    container_name: ainrf-grafana
    network_mode: host
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-ainrf-grafana}
      GF_SERVER_HTTP_ADDR: "127.0.0.1"
      GF_SERVER_HTTP_PORT: "3000"
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
      GF_SERVER_ROOT_URL: "${AINRF_GRAFANA_ROOT_URL:-http://157.255.30.82:8192/grafana}"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_AUTH_PROXY_ENABLED: "true"
      GF_AUTH_PROXY_HEADER: "X-WEBAUTH-USER"
      GF_AUTH_PROXY_AUTO_SIGN_UP: "true"
    volumes:
      - ./config/grafana/provisioning-host:/etc/grafana/provisioning:ro
      - ./config/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  nginx:
    image: docker.1ms.run/nginx:1.27-alpine
    restart: unless-stopped
    container_name: ainrf-nginx
    network_mode: host
    volumes:
      - ./config/nginx-host.conf:/etc/nginx/conf.d/default.conf:ro
      - ../frontend/dist/production:/usr/share/nginx/html:ro
    depends_on:
      ainrf:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:8192/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  ainrf-state:
  ainrf-workspaces:
  ainrf-tenants:
  prometheus-data:
  grafana-data:
