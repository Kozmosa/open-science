# ── OpenScience TLS Secret ──────────────────────────────────────────
#
# Create from files:
#   kubectl create secret tls ainrf-tls \
#     --namespace ainrf \
#     --cert=cert.pem --key=key.pem
#
# Or for lab use with self-signed:
#   bash deploy/tls/generate-self-signed.sh
#   kubectl create secret tls ainrf-tls \
#     --namespace ainrf \
#     --cert=deploy/tls/cert.pem --key=deploy/tls/key.pem
# ──────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: ainrf-tls
  namespace: ainrf
type: kubernetes.io/tls
data:
  # Replace with: kubectl create secret tls ainrf-tls --cert=... --key=...
  tls.crt: Q0hBTkdFX01F
  tls.key: Q0hBTkdFX01F
