# ── AINRF Secrets ─────────────────────────────────────────────
#
# Create with actual values:
#   kubectl create secret generic ainrf-secrets \
#     --namespace ainrf \
#     --from-literal=JWT_SECRET=$(python3 -c "import secrets; print(secrets.token_urlsafe(48))") \
#     --from-literal=API_KEY_HASHES=$(python3 -c "from hashlib import sha256; print(sha256(b'YOUR_API_KEY').hexdigest())") \
#     --from-literal=CLAUDE_API_KEY=sk-ant-your-claude-key \
#     --from-literal=CODEX_API_KEY=sk-your-openai-key
#
# Or apply this template (base64-encoded):
#   echo -n 'your-secret' | base64
# ──────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: ainrf-secrets
  namespace: ainrf
type: Opaque
data:
  # Base64-encoded values — replace with your own
  JWT_SECRET: Q0hBTkdFX01FX2dlbmVyYXRlX3dpdGhfc2VjcmV0c190b2tlbl91cmxzYWZlXzQ4
  API_KEY_HASHES: Q0hBTkdFX01FX3NoYTI1Nl9oZXhfb2ZfeW91cl9hcGlfa2V5
  ANTHROPIC_API_KEY: ""
  CODEX_API_KEY: ""
