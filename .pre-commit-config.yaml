repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.12.11
    hooks:
      - id: ruff-check
      - id: ruff-format

  - repo: local
    hooks:
      - id: pytest-fast
        name: Run fast test suite
        entry: bash scripts/test.sh fast
        language: system
        pass_filenames: false
        stages: [pre-commit]
        always_run: true
