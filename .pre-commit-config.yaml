default_install_hook_types: [pre-commit, pre-push]

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.6
    hooks:
      - id: ruff-check
      - id: ruff-format

  - repo: local
    hooks:
      - id: ci-l0
        name: Run OpenScience L0 CI
        entry: bash scripts/ci.sh l0
        language: system
        pass_filenames: false
        stages: [pre-push]
        always_run: true
